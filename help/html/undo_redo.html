<body>
  <h1>Отмена и повтор действий (Undo / Redo)</h1>
  <p>Все действия рисования изолиний (добавление/удаление) попадают в Undo-стек.</p>
  <ul>
    <li><strong>Отменить:</strong> <kbd>Ctrl+Z</kbd> или Правка → Отменить.</li>
    <li><strong>Повторить:</strong> <kbd>Ctrl+Shift+Z</kbd> или Правка → Повторить.</li>
  </ul>

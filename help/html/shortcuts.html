<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Горячие клавиши — Справка TIN-Demo</title>
  <style>
    body { font-family: sans-serif; margin: 2em; background: #fff; color: #000; }
    h1 { border-bottom: 1px solid #ccc; padding-bottom: .2em; }
    ul { list-style: none; padding-left: 0; }
    li { margin: .5em 0; }
    a { text-decoration: none; color: #006; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Горячие клавиши</h1>
  <table>
    <tr><td><kbd>Ctrl+O</kbd></td><td>Открыть файл</td></tr>
    <tr><td><kbd>Ctrl+S</kbd></td><td>Сохранить проект</td></tr>
    <tr><td><kbd>Ctrl+D</kbd></td><td>Включить/выключить режим рисования</td></tr>
    <tr><td><kbd>Ctrl+Z</kbd></td><td>Отменить действие</td></tr>
    <tr><td><kbd>Ctrl+Shift+Z</kbd></td><td>Повторить действие</td></tr>
    <tr><td><kbd>F1</kbd></td><td>Открыть справку</td></tr>
    <tr><td><kbd>Двойной клик ЛКМ</kbd></td><td>Завершить рисование изолинии</td></tr>
    <tr><td>Колёсико мыши</td><td>Масштабирование</td></tr>
  </table>
  <p><a href="index.html">← Назад</a></p>
</body>
</html>
